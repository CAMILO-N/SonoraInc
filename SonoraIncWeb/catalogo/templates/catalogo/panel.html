{% extends "base.html" %}
{% block title %}Panel de administración — SonoraInc{% endblock %}

{% block content %}

<h1 class="page-title">Panel de administración</h1>

<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.25rem">

  {% for item in panel_items %}
  <a href="{{ item.url }}"
     style="background:#1a1400;border:2px solid var(--accent);border-radius:10px;
            padding:1.5rem;text-decoration:none;color:var(--text);transition:background .18s"
     onmouseover="this.style.background='#251d00'"
     onmouseout="this.style.background='#1a1400'">
    <div style="font-weight:700;font-size:1rem;margin-bottom:.4rem;color:var(--accent)">{{ item.label }}</div>
    <div style="color:var(--muted);font-size:.85rem">{{ item.total }} registros</div>
  </a>
  {% endfor %}

</div>

{% endblock %}
