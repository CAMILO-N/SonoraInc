{% extends "base.html" %}
{% block title %}Registro — SonoraInc{% endblock %}

{% block content %}
<div style="max-width:480px;margin:3rem auto">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="font-size:2.5rem">🎵</div>
    <h1 style="font-size:1.4rem;font-weight:700;margin-top:.5rem">Crear cuenta</h1>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre"
                 value="{{ post.nombre }}" placeholder="Carlos" required>
        </div>
        <div class="form-group">
          <label>Apellido *</label>
          <input type="text" name="apellido"
                 value="{{ post.apellido }}" placeholder="Mendoza" required>
        </div>
      </div>
      <div class="form-group">
        <label>Correo electrónico *</label>
        <input type="email" name="correo"
               value="{{ post.correo }}" placeholder="tu@correo.com" required>
      </div>
      <div class="form-group">
        <label>Fecha de registro *</label>
        <input type="date" name="fecha"
               value="{{ post.fecha }}" required>
      </div>
      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" name="password" placeholder="Mínimo 6 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña *</label>
        <input type="password" name="password2" placeholder="Repite la contraseña" required>
      </div>
      <div class="mt-2">
        <button type="submit" class="btn btn-primary btn-full">
          Crear cuenta
        </button>
      </div>
    </form>
  </div>

  <p class="text-muted mt-2" style="text-align:center;font-size:.9rem">
    ¿Ya tienes cuenta?
    <a href="{% url 'usuarios:login' %}" style="color:var(--accent)">Inicia sesión</a>
  </p>
</div>
{% endblock %}
